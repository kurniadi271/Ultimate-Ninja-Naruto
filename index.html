<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Ninja System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial Black', Arial, sans-serif;
        }
        #output_canvas {
            transform: scaleX(-1);
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            display: block;
        }
        #hud {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        #seal-hint {
            position: absolute;
            top: 14px; left: 14px;
            background: rgba(0,0,0,0.65);
            border: 1px solid rgba(255,160,0,0.4);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
            color: #f1c40f;
            line-height: 2.4;
        }
        #seal-hint b { color: #fff; }
        #seal-hint small { color: #777; font-size: 10px; display: block; margin-top: 6px; }
        
        .hint-img {
            width: 24px;
            height: 24px;
            object-fit: cover;
            border-radius: 4px;
            vertical-align: middle;
            margin-right: 8px;
            border: 1px solid rgba(255, 140, 0, 0.5);
        }

        #jutsu-name {
            position: absolute;
            top: 40%; left: 50%;
            transform: translate(-50%,-50%) scale(0.5);
            font-size: 50px;
            font-weight: 900;
            letter-spacing: 6px;
            white-space: nowrap;
            text-align: center;
            opacity: 0;
            transition: opacity 0.2s, transform 0.25s;
            text-shadow: 3px 3px 0 #000, -3px -3px 0 #000, 0 0 25px currentColor;
        }
        #jutsu-name.kage { color: #f1c40f; }
        #jutsu-name.rasengan { color: #74b9ff; }
        #jutsu-name.show {
            opacity: 1;
            transform: translate(-50%,-50%) scale(1);
            animation: pop-in 0.35s ease-out;
        }
        @keyframes pop-in {
            0% { transform: translate(-50%,-50%) scale(2.4); }
            100% { transform: translate(-50%,-50%) scale(1); }
        }
        #jutsu-sub {
            position: absolute;
            top: 54%; left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            letter-spacing: 5px;
            color: rgba(255,255,255,0.65);
            opacity: 0;
            transition: opacity 0.3s 0.2s;
            white-space: nowrap;
        }
        #jutsu-sub.show { opacity: 1; }
        
        #chakra-wrap {
            position: absolute;
            bottom: 18px; left: 50%;
            transform: translateX(-50%);
            width: 280px;
            text-align: center;
        }
        #chakra-label { font-size: 10px; letter-spacing: 4px; color: #74b9ff; margin-bottom: 5px; }
        #chakra-track { width: 100%; height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; }
        #chakra-fill { height: 100%; width: 0%; border-radius: 3px; transition: width 0.12s linear; }
        #chakra-fill.kage { background: linear-gradient(90deg,#e67e22,#f1c40f,#fffde7); box-shadow: 0 0 8px #f1c40f; }
        #chakra-fill.rasn { background: linear-gradient(90deg,#0984e3,#74b9ff,#e0f0ff); box-shadow: 0 0 8px #74b9ff; }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at 50% 25%, #1c0900 0%, #040404 65%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; color: #fff; text-align: center;
        }
        .konoha-logo { width: 76px; margin-bottom: 12px; filter: drop-shadow(0 0 14px rgba(255,150,0,0.65)); }
        .tagline { font-size: 11px; letter-spacing: 10px; color: #666; margin-bottom: 6px; }
        #start-screen h1 { font-size: 54px; color: #ff8c00; letter-spacing: 12px; margin-bottom: 28px; }
        
        .seal-cards { display: flex; gap: 16px; margin-bottom: 30px; }
        .seal-card {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,140,0,0.2);
            border-radius: 12px; padding: 18px 20px; min-width: 160px;
            display: flex; flex-direction: column; align-items: center;
        }
        .card-img {
            width: 60px; height: 60px; object-fit: cover; border-radius: 8px;
            margin-bottom: 12px; border: 2px solid rgba(255, 140, 0, 0.4);
        }
        .seal-card .name { color: #ff8c00; font-size: 14px; font-weight: bold; }
        .seal-card .desc { color: #bbb; font-size: 11px; margin-top: 5px; line-height: 1.4; text-align: center; }
        
        #start-btn {
            padding: 14px 46px; font-size: 18px; font-weight: bold; cursor: pointer;
            background: linear-gradient(135deg,#c0392b,#e74c3c); color: #fff; border: none; border-radius: 7px;
        }
        #loading-text { color: #f1c40f; font-size: 13px; margin-top: 16px; }
        #vol-wrap { position: absolute; bottom: 18px; right: 20px; display: flex; gap: 8px; font-size: 11px; color: #666; z-index: 30; }
        .hidden { display: none !important; }

        #vid-rasengan {
            position: absolute; top: 0; left: 0; width: 500px; 
            transform: translate(-50%, -50%) scale(1); pointer-events: none;
            display: none; mix-blend-mode: screen; z-index: 10;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation@0.1.1632777926/selfie_segmentation.js" crossorigin="anonymous"></script>
</head>
<body>

<canvas id="output_canvas" width="1280" height="720"></canvas>

<div id="hud">
    <div id="seal-hint">
        <img src="segel1.png" alt="Kagebunshin" class="hint-img"> 2 Tangan Disilang → <b>KAGEBUNSHIN</b><br>
        <img src="segel2.png" alt="Rasengan" class="hint-img"> Tangan Menadah → <b>RASENGAN</b><br>
        <small>Punggung tangan ke kamera, telapak ke atas</small>
    </div>
    <div id="jutsu-name"></div>
    <div id="jutsu-sub"></div>
    <div id="chakra-wrap">
        <div id="chakra-label">— CHAKRA —</div>
        <div id="chakra-track"><div id="chakra-fill"></div></div>
    </div>
</div>

<div id="start-screen">
    <svg class="konoha-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="46" fill="none" stroke="#ff8c00" stroke-width="3.5"/>
        <path d="M50 15 C72 22,86 40,82 57 C78 74,61 82,50 86 C39 82,22 74,18 57 C14 40,28 22,50 15Z" fill="none" stroke="#ff8c00" stroke-width="2.2"/>
        <path d="M50 26 C63 32,72 46,70 57 C68 68,57 73,50 76" fill="none" stroke="#ff8c00" stroke-width="1.8"/>
        <circle cx="50" cy="50" r="5" fill="#ff8c00"/>
    </svg>
    <p class="tagline">KONOHAGAKURE NO SATO</p>
    <h1>SHINOBI</h1>
    <div class="seal-cards">
        <div class="seal-card">
            <img src="segel1.png" alt="Kagebunshin" class="card-img">
            <div class="name">KAGEBUNSHIN</div>
            <div class="desc">Segel<br>Aktivasi</div>
        </div>
        <div class="seal-card">
            <img src="segel2.png" alt="Rasengan" class="card-img">
            <div class="name">RASENGAN</div>
            <div class="desc">🫴🏻</div>
        </div>
    </div>
    <button id="start-btn">⚡ AKTIFKAN CHAKRA</button>
    <div id="loading-text" class="hidden">⏳ Memuat Chakra AI... harap tunggu 10–20 detik...</div>
    <div id="vol-wrap">
        🎵 BGM <input type="range" id="vol-slider" min="0" max="100" value="35" oninput="setBgmVol(this.value)">
    </div>
</div>

<video id="video-webcam" style="display:none" autoplay playsinline></video>
<video id="vid-asap"     class="hidden" src="asap.mp4"     muted playsinline></video>
<video id="vid-rasengan" src="rasengan.mp4" muted playsinline></video>

<audio id="sfx-jutsu"    src="jutsu.mp3"    preload="auto"></audio>
<audio id="sfx-rasengan" src="rasengan.mp3" preload="auto"></audio> <audio id="bgm"          src="bgm.mp3" loop preload="auto"></audio>

<script>
// REFS
const videoEl = document.getElementById('video-webcam');
const canvas  = document.getElementById('output_canvas');
const ctx     = canvas.getContext('2d', { willReadFrequently: true });

const vidAsap     = document.getElementById('vid-asap');
const vidRasengan = document.getElementById('vid-rasengan');
const sfxJutsu    = document.getElementById('sfx-jutsu');
const sfxRasengan = document.getElementById('sfx-rasengan');
const bgm         = document.getElementById('bgm');

const jutsuNameEl = document.getElementById('jutsu-name');
const jutsuSubEl  = document.getElementById('jutsu-sub');
const chakraFill  = document.getElementById('chakra-fill');

// ✨ SETUP LOOPING VIDEO & AUDIO RASENGAN (SINKRON DETIK 3.4) ✨
vidRasengan.removeAttribute('loop');
vidRasengan.addEventListener('ended', () => {
    vidRasengan.currentTime = 3.4; 
    vidRasengan.play().catch(()=>{});
});

sfxRasengan.removeAttribute('loop');
sfxRasengan.addEventListener('ended', () => {
    sfxRasengan.currentTime = 3.4; // Disamakan persis dengan video
    sfxRasengan.play().catch(()=>{});
});

// CANVAS PRE-ALLOC
const silCanvas = document.createElement('canvas');
silCanvas.width = 1280; silCanvas.height = 720;
const silCtx = silCanvas.getContext('2d');

const smokeTC = document.createElement('canvas');
smokeTC.width = 640; smokeTC.height = 360;
const smokeTCtx = smokeTC.getContext('2d', { willReadFrequently: true });

// STATE
let modeJutsu = null;
let startTime = 0;
let suaraAktif = false;
let smokeTime = 0;
let wasOpen = false; 
let jutsuScale = 1.0; 

function setBgmVol(v) { bgm.volume = v / 100; }

document.body.addEventListener('click', function bgmStarter() {
    if (bgm.paused) {
        bgm.volume = document.getElementById('vol-slider').value / 100;
        bgm.play().catch(() => {});
    }
    document.body.removeEventListener('click', bgmStarter);
});

// DETECTORS
function isSealFingers(lm) {
    return lm[8].y < lm[6].y && lm[16].y > lm[14].y && lm[20].y > lm[18].y;
}
function cekKageCross(lm0, lm1) {
    if (!lm0 || !lm1) return false;
    if (isSealFingers(lm0) && isSealFingers(lm1)) {
        const dx = lm0[9].x - lm1[9].x;
        const dy = lm0[9].y - lm1[9].y;
        return Math.sqrt(dx*dx + dy*dy) < 0.35; 
    }
    return false;
}
function cekRasengan(lm) {
    return lm[8].y < lm[6].y && lm[12].y < lm[10].y && lm[16].y < lm[14].y && lm[20].y < lm[18].y;
}

// CLONES POSITIONS
function buildClones(W, H) {
    const p = [];
    const r0h = H*0.22, r0w = r0h*0.50;
    for(let i=0;i<5;i++) p.push({x:(W/5)*i+W/10-r0w/2, y:0, w:r0w, h:r0h, delay:0.04+i*0.05});
    const r1h = H*0.34, r1w = r1h*0.50;
    for(let i=0;i<4;i++) p.push({x:(W/4)*i+W/8-r1w/2, y:H*0.09, w:r1w, h:r1h, delay:0.22+i*0.06});
    const r2h = H*0.50, r2w = r2h*0.50;
    for(let i=0;i<3;i++) p.push({x:(W/3)*i+W/6-r2w/2, y:H*0.22, w:r2w, h:r2h, delay:0.40+i*0.08});
    const r3h = H*0.72, r3w = r3h*0.50;
    p.push({x:0, y:H*0.28, w:r3w, h:r3h, delay:0.60});
    p.push({x:W-r3w, y:H*0.28, w:r3w, h:r3h, delay:0.70});
    return p;
}
const CLONES = buildClones(1280, 720);

// SAFE DRAW SMOKE DENGAN CHROMA KEY LEVEL DEWA
function drawSmoke(dx, dy, dw, dh, alpha) {
    if (vidAsap.readyState < 2) return;
    
    let w = Math.max(1, Math.ceil(dw));
    let h = Math.max(1, Math.ceil(dh));

    if (smokeTC.width !== w || smokeTC.height !== h) {
        smokeTC.width = w; smokeTC.height = h;
    }
    smokeTCtx.clearRect(0, 0, w, h);
    smokeTCtx.drawImage(vidAsap, 0, 0, w, h);
    
    try {
        const fd = smokeTCtx.getImageData(0, 0, w, h);
        const d  = fd.data;
        for (let i = 0; i < d.length; i += 4) {
            let r = d[i], g = d[i+1], b = d[i+2];
            let maxRB = Math.max(r, b);
            
            if (g > maxRB) {
                let greenness = g - maxRB; 
                if (greenness > 10) {
                    d[i+3] = 0; 
                } else {
                    d[i+1] = maxRB; 
                    d[i+3] = Math.max(0, 255 - (greenness * 25)); 
                }
            }
        }
        smokeTCtx.putImageData(fd, 0, 0);
    } catch (e) {
        // Fallback jika diblokir CORS
    }
    
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.globalCompositeOperation = 'screen';
    ctx.drawImage(smokeTC, dx, dy, w, h);
    ctx.restore();
}

// HUD
function showJutsu(name, sub, cls) {
    jutsuNameEl.textContent = name; jutsuNameEl.className = cls + ' show';
    jutsuSubEl.textContent = sub; jutsuSubEl.className = 'show';
}
function hideJutsu() { jutsuNameEl.className = ''; jutsuSubEl.className = ''; }
function setChakra(pct, cls) { chakraFill.className = cls; chakraFill.style.width = Math.min(100, pct) + '%'; }
function clearChakra() { chakraFill.className = ''; chakraFill.style.width = '0%'; }

// MEDIAPIPE
const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}` });
hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.72, minTrackingConfidence: 0.72 });
const selfie = new SelfieSegmentation({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation@0.1.1632777926/${f}` });
selfie.setOptions({ modelSelection: 1 });

// HAND LOGIC
hands.onResults(results => {
    let isKage = false, isRasen = false, activeHand = null;

    if (results.multiHandLandmarks?.length > 0) {
        const hand0 = results.multiHandLandmarks[0];
        const hand1 = results.multiHandLandmarks.length > 1 ? results.multiHandLandmarks[1] : null;

        if (hand0 && hand1 && cekKageCross(hand0, hand1)) {
            isKage = true;
        } else if ((hand0 && cekRasengan(hand0)) || (hand1 && cekRasengan(hand1))) {
            isRasen = true;
            activeHand = (hand0 && cekRasengan(hand0)) ? hand0 : hand1;
        }
    }

    if (isKage) {
        if (modeJutsu !== 'kage') {
            modeJutsu = 'kage'; startTime = Date.now(); smokeTime = Date.now();
            suaraAktif = false; vidAsap.currentTime = 0; vidAsap.loop = false;
            vidAsap.play().catch(()=>{}); showJutsu('KAGEBUNSHIN', 'SHADOW CLONE TECHNIQUE', 'kage');
        }
    } else if (isRasen) {
        if (modeJutsu !== 'rasengan') {
            modeJutsu = 'rasengan'; startTime = Date.now(); suaraAktif = false;
            showJutsu('RASENGAN', 'WIND RELEASE', 'rasengan');
        }
    } else {
        if (modeJutsu !== null) { 
            modeJutsu = null; 
            vidAsap.pause(); 
            hideJutsu(); 
            clearChakra(); 
            
            // ✨ MATIKAN SEMUA SFX SAAT TANGAN DILEPAS ✨
            sfxJutsu.pause();
            sfxRasengan.pause();
        }
    }

    if (isRasen && activeHand) {
        if (!wasOpen) { jutsuScale = 0.8; vidRasengan.currentTime = 0; vidRasengan.play().catch(()=>{}); }
        jutsuScale = Math.min(1.5, jutsuScale + 0.015); 
        
        const tx = (activeHand[0].x + activeHand[9].x) / 2;
        const ty = (activeHand[0].y + activeHand[9].y) / 2;

        vidRasengan.style.transform = `translate(-50%, -50%) scale(${jutsuScale})`;
        vidRasengan.style.left = `${(1 - tx) * window.innerWidth}px`;
        vidRasengan.style.top = `${(ty * window.innerHeight) - 280}px`; 
        vidRasengan.style.display = 'block'; 
    } else {
        vidRasengan.style.display = 'none'; vidRasengan.pause();
    }
    wasOpen = isRasen;
    selfie.send({ image: results.image });
});

// RENDER LOOP
selfie.onResults(results => {
    const W = canvas.width, H = canvas.height;
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
    ctx.drawImage(results.image, 0, 0, W, H);

    const dur = (Date.now() - startTime) / 1000;

    if (modeJutsu === 'kage') {
        if (!suaraAktif) { sfxJutsu.currentTime = 0; sfxJutsu.play().catch(()=>{}); suaraAktif = true; }
        setChakra(dur / 4 * 100, 'kage');  

        if (!results.segmentationMask) return;

        silCtx.clearRect(0, 0, W, H);
        silCtx.globalCompositeOperation = 'source-over';
        silCtx.drawImage(results.segmentationMask, 0, 0, W, H);
        silCtx.globalCompositeOperation = 'source-in';
        silCtx.drawImage(results.image, 0, 0, W, H);
        silCtx.globalCompositeOperation = 'source-over';

        const smokeSec = (Date.now() - smokeTime) / 1000;
        const smokeAlpha = smokeSec < 1.7 ? 1.0 : smokeSec < 2.3 ? 1 - (smokeSec - 1.7) / 0.6 : 0;

        CLONES.forEach(p => {
            const tm = dur - p.delay;
            if (tm <= 0) return;
            const alpha = Math.min(1, tm / 0.28);

            ctx.save(); ctx.globalAlpha = alpha; ctx.drawImage(silCanvas, p.x, p.y, p.w, p.h); ctx.restore();

            if (smokeAlpha > 0.01) {
                const sw = p.w * 2.2, sh = p.h * 0.45;
                drawSmoke(p.x - (sw - p.w)/2, p.y + p.h - sh*0.55, sw, sh, smokeAlpha * alpha);
            }
        });
        ctx.globalAlpha = 1; ctx.drawImage(silCanvas, 0, 0, W, H);
    } 
    else if (modeJutsu === 'rasengan') {
        if (!suaraAktif) { sfxRasengan.currentTime = 0; sfxRasengan.play().catch(()=>{}); suaraAktif = true; }
        setChakra(dur / 10 * 100, 'rasn');  
        if (dur > 5 && Math.random() > 0.88) {
            ctx.save(); ctx.globalAlpha = 0.07; ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H); ctx.restore();
        }
    }
});

// START
const camera = new Camera(videoEl, { onFrame: async () => { await hands.send({ image: videoEl }); }, width: 1280, height: 720 });
document.getElementById('start-btn').addEventListener('click', async () => {
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('loading-text').classList.remove('hidden');
    try { vidRasengan.play().then(() => vidRasengan.pause()).catch(()=>{}); } catch(e){}
    try {
        await hands.initialize(); await selfie.initialize();
        document.getElementById('start-screen').classList.add('hidden');
        bgm.pause(); bgm.currentTime = 0; camera.start();
    } catch (err) {
        document.getElementById('loading-text').innerHTML = '❌ Gagal memuat AI.';
    }
});
</script>
</body>
</html>
